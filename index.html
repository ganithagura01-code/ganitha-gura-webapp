<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANITHA-GURA (ගුරුගේ) — LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- NAVIGATION -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg text-indigo-400">GANITHA-GURA</h1>
            <div class="flex gap-2">
                <button onclick="switchTab('view-home')" class="px-4 py-2 bg-slate-800 rounded text-sm cursor-pointer hover:bg-slate-700">REGISTER</button>
                <button onclick="switchTab('view-student-portal')" class="px-4 py-2 bg-slate-800 rounded text-sm cursor-pointer hover:bg-slate-700">STUDENT</button>
                <button onclick="switchTab('view-admin-dashboard')" class="px-4 py-2 bg-slate-800 rounded text-sm cursor-pointer hover:bg-slate-700">TEACHER</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        
        <!-- 1. REGISTRATION -->
        <section id="view-home">
            <h2 class="text-xl font-bold mb-4">සිසුන් ලියාපදිංචිය</h2>
            <form id="regForm" onsubmit="handleRegistration(event)" class="bg-slate-900 p-6 rounded-xl space-y-4">
                <input type="text" id="regName" required placeholder="නම" class="w-full p-3 bg-slate-950 border border-slate-700 rounded text-white">
                <select id="regGrade" class="w-full p-3 bg-slate-950 border border-slate-700 rounded text-white">
                    <option value="6">6 ශ්‍රේණිය</option><option value="7">7 ශ්‍රේණිය</option><option value="8">8 ශ්‍රේණිය</option>
                    <option value="9">9 ශ්‍රේණිය</option><option value="10">10 ශ්‍රේණිය</option><option value="11">11 ශ්‍රේණිය</option>
                </select>
                <input type="text" id="regSchool" required placeholder="පාසල" class="w-full p-3 bg-slate-950 border border-slate-700 rounded text-white">
                <input type="tel" id="regPhone" required placeholder="දුරකථන අංකය" class="w-full p-3 bg-slate-950 border border-slate-700 rounded text-white">
                <button type="submit" class="w-full bg-indigo-600 py-3 rounded font-bold cursor-pointer hover:bg-indigo-500">ලියාපදිංචි වන්න</button>
            </form>
        </section>

        <!-- 2. STUDENT PORTAL -->
        <section id="view-student-portal" class="hidden">
            <div id="studentLoginBox" class="bg-slate-900 p-6 rounded-xl">
                <input type="text" id="studentLoginId" placeholder="GG-XXXX" class="w-full p-3 bg-slate-950 border border-slate-700 rounded text-white">
                <button onclick="handleStudentLogin()" class="w-full bg-indigo-600 mt-3 py-3 rounded font-bold cursor-pointer hover:bg-indigo-500">පිවිසෙන්න</button>
            </div>
            <div id="student-dashboard" class="hidden bg-slate-900 p-6 rounded-xl mt-4"></div>
        </section>

        <!-- 3. ADMIN / TEACHER -->
        <section id="view-admin-dashboard" class="hidden space-y-4">
            <div id="admin-login-area">
                <input type="email" id="adminEmail" placeholder="Email" class="w-full p-3 bg-slate-900 border border-slate-700 rounded text-white">
                <input type="password" id="adminPassword" placeholder="Password" class="w-full p-3 bg-slate-900 border border-slate-700 rounded mt-2 text-white">
                <button onclick="loginAdmin()" class="w-full bg-cyan-600 mt-2 py-3 rounded cursor-pointer hover:bg-cyan-500">LOGIN</button>
            </div>
            <div id="admin-panel" class="hidden">
                <button onclick="logoutAdmin()" class="bg-red-600 px-4 py-2 rounded text-sm cursor-pointer">Logout</button>
                <div id="studentsTableBody" class="mt-4 bg-slate-900 p-4 rounded-xl"></div>
            </div>
        </section>
    </main>

    <script>
        // CONFIG
        const firebaseConfig = {
           apiKey: "AIzaSyDqH2onBtKBcF9Yccpt7fHDNZOwcJDRIDk",
           authDomain: "ganitha-gura.firebaseapp.com",
           databaseURL: "https://ganitha-gura-default-rtdb.firebaseio.com",
           projectId: "ganitha-gura",
           storageBucket: "ganitha-gura.firebasestorage.app",
           messagingSenderId: "477992277636",
           appId: "1:477992277636:web:e25ba0f503cfa2a32194d1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAV
        function switchTab(tabId) {
            ['view-home', 'view-student-portal', 'view-admin-dashboard'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(tabId).classList.remove('hidden');
        }

        // REGISTRATION
        function handleRegistration(e) {
            e.preventDefault();
            const id = "GG-" + Math.floor(1000 + Math.random() * 9000);
            const data = {
                name: document.getElementById('regName').value,
                grade: document.getElementById('regGrade').value,
                school: document.getElementById('regSchool').value,
                phone: document.getElementById('regPhone').value
            };
            db.ref('students/' + id).set(data).then(() => alert("සාර්ථකයි! ඔබේ අංකය: " + id));
        }

        // STUDENT LOGIN
        function handleStudentLogin() {
            const id = document.getElementById('studentLoginId').value;
            db.ref('students/' + id).once('value').then(snap => {
                if(snap.exists()) {
                    document.getElementById('student-dashboard').innerHTML = `<p class="text-lg">ආයුබෝවන්, ${snap.val().name}</p><p>පන්ති අංකය: ${id}</p>`;
                    document.getElementById('student-dashboard').classList.remove('hidden');
                    document.getElementById('studentLoginBox').classList.add('hidden');
                } else alert("වැරදි අංකයකි!");
            });
        }

        // ADMIN LOGIN
        function loginAdmin() {
            firebase.auth().signInWithEmailAndPassword(document.getElementById('adminEmail').value, document.getElementById('adminPassword').value)
            .then(() => window.location.reload())
            .catch(err => alert(err.message));
        }

        function logoutAdmin() {
            firebase.auth().signOut().then(() => window.location.reload());
        }

        // ADMIN PANEL
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('admin-login-area').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                db.ref('students').once('value').then(snap => {
                    let html = '<table class="w-full text-sm"><tr><th class="p-2 border-b">ID</th><th class="p-2 border-b">Name</th></tr>';
                    snap.forEach(s => html += `<tr><td class="p-2 border-b">${s.key}</td><td class="p-2 border-b">${s.val().name}</td></tr>`);
                    document.getElementById('studentsTableBody').innerHTML = html + '</table>';
                });
            }
        });
    </script>
</body>
</html>
