<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANITHA-GURA — LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-indigo-400 text-lg">GANITHA-GURA</h1>
            <div class="flex gap-2">
                <button onclick="switchTab('home')" class="px-3 py-1 bg-slate-800 rounded text-sm">ලියාපදිංචිය</button>
                <button onclick="switchTab('student')" class="px-3 py-1 bg-slate-800 rounded text-sm">සිසුන්</button>
                <button onclick="switchTab('admin')" class="px-3 py-1 bg-slate-800 rounded text-sm">ගුරු අංශය</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 space-y-8">
        
        <section id="view-home">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                <h2 class="text-xl font-bold mb-4">සිසුන් ලියාපදිංචිය</h2>
                <form id="regForm" onsubmit="handleRegistration(event)" class="space-y-4">
                    <input type="text" id="regName" placeholder="ඔබේ නම" required class="w-full p-2 bg-slate-950 border border-slate-700 rounded">
                    <input type="tel" id="regPhone" placeholder="දුරකථන අංකය (07...)" required class="w-full p-2 bg-slate-950 border border-slate-700 rounded">
                    <button type="submit" class="w-full bg-indigo-600 p-2 rounded font-bold hover:bg-indigo-500 transition">ලියාපදිංචි වන්න</button>
                </form>
            </div>
        </section>

        <section id="view-student" class="hidden">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 text-center">
                <h2 class="text-xl font-bold mb-4">සිසුන් සඳහා</h2>
                <p class="text-slate-400">ඔබේ ඉගෙනුම් අංශයට සාදරයෙන් පිළිගනිමු.</p>
            </div>
        </section>

        <section id="view-admin" class="hidden">
            <div id="admin-login-div" class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                <h2 class="text-xl font-bold mb-4">ගුරු මුරපදය</h2>
                <input type="password" id="adminPass" placeholder="මුරපදය" class="w-full p-2 bg-slate-950 border border-slate-700 rounded mb-2">
                <button onclick="checkAdmin()" class="w-full bg-cyan-600 p-2 rounded font-bold">පිවිසෙන්න</button>
            </div>

            <div id="admin-dashboard-div" class="hidden">
                <h2 class="text-xl font-bold mb-4">ලියාපදිංචි වූ සිසුන්</h2>
                <div class="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-slate-800 text-slate-400">
                                <th class="p-3">නම</th>
                                <th class="p-3">දුරකථන අංකය</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDqH2onBtKBcF9Yccpt7fHDNZOwcJDRIDk",
            authDomain: "ganitha-gura.firebaseapp.com",
            databaseURL: "https://ganitha-gura-default-rtdb.firebaseio.com",
            projectId: "ganitha-gura",
            storageBucket: "ganitha-gura.firebasestorage.app",
            messagingSenderId: "477992277636",
            appId: "1:477992277636:web:e25ba0f503cfa2a32194d1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Tabs Navigation
        function switchTab(tab) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
        }

        // SMS Sending Logic
        function sendNotifySMS(phoneNumber, messageText) {
            const proxyUrl = "https://script.google.com/macros/s/AKfycbw-cTmq4T53uvS8fqHUAIpMPXhYr-Suij4IPU1FNcLuESQQT8gUU0iwbjlm2otaC7LxQ/exec";
            let formattedNumber = phoneNumber.trim().startsWith("0") ? "94" + phoneNumber.substring(1) : phoneNumber;
            
            fetch(proxyUrl, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ phoneNumber: formattedNumber, message: messageText })
            }).then(() => console.log("SMS සාර්ථකයි")).catch(err => console.error("SMS Error:", err));
        }

        // Registration Handle
        function handleRegistration(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            
            db.ref('students/').push({ name: name, phone: phone });
            
            alert("ලියාපදිංචිය සාර්ථකයි!");
            document.getElementById('regForm').reset();
            
            // සිංහල පණිවිඩය
            const smsMsg = "ආයුබෝවන් " + name + ", ගණිත ගුරු පන්තියට ඔබව සාදරයෙන් පිළිගනිමු!";
            sendNotifySMS(phone, smsMsg);
        }

        // Admin Auth
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('admin-login-div').classList.add('hidden');
                document.getElementById('admin-dashboard-div').classList.remove('hidden');
                loadStudents();
            } else {
                alert("වැරදි මුරපදයකි!");
            }
        }

        // Table Loading
        function loadStudents() {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = "";
            db.ref('students/').on('value', snapshot => {
                tbody.innerHTML = ""; // Clear existing
                snapshot.forEach(child => {
                    let s = child.val();
                    tbody.innerHTML += `<tr class="border-b border-slate-800">
                        <td class="p-3">${s.name}</td>
                        <td class="p-3">${s.phone}</td>
                    </tr>`;
                });
            });
        }
    </script>
</body>
</html>
